<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e8,#ffc1dc);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.card{
text-align:center;
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 0 25px rgba(0,0,0,.2);
width:90%;
max-width:400px;
}

h1{
color:#ff4f9a;
font-size:40px;
margin-bottom:15px;
}

p{
font-size:20px;
margin-bottom:25px;
color:#444;
}

button{
padding:15px 35px;
border:none;
border-radius:30px;
background:#ff5ca8;
color:white;
font-size:20px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}
</style>

</head>
<body>

<div class="card">
<h1>Hey Babyyyy ❤️</h1>

<p>I have a little surprise waiting for you...</p>

<button onclick="alert('Lights ON ✨')">
Turn On Lights 💡
</button>

</div>

</body>
</html>
